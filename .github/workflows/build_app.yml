name: Build images
concurrency:
  group: ${{ github.workflow }}

on:
  push:
    branches: ["main"]
    paths:
    - 'src/**'
    - '!.github/workflows/configure_pi.yml'
    - '.github/workflows/build_images.yml'
  pull_request:
    branches: ["main"]
    paths:
    - 'src/**'
    - '!.github/workflows/configure_pi.yml'
    - '.github/workflows/build_images.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build and deploy to ACR
    environment: dev
    env:
      image_name: tgc-starrealming-api
      project_name: TGC.StarRealming
      api_path: src/TGC.StarRealming.Api/TGC.StarRealming.Api/TGC.StarRealming.Api.csproj
      acr_registry: tgclzdevacr.azurecr.io

    steps:
    - uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.0.5

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - run: |
        docker --version

    - name: Restore dependencies
      run: dotnet restore $api_path

    - name: Build
      run: dotnet build $api_path --no-restore

    # - name: Run Unit Tests
    #   run: dotnet test src/TGC.HomeAutomation/TGC.HomeAutomation.Api.IntegrationTests/TGC.HomeAutomation.Api.IntegrationTests.csproj --verbosity normal

    - name: 'Az CLI login'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.HOMEAUTOMATION_DEV_CLIENT_ID }}
        tenant-id: ${{ secrets.HOMEAUTOMATION_DEV_TENANT_ID }}
        subscription-id: ${{ secrets.HOMEAUTOMATION_DEV_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name tgclzdevacr.azurecr.io

    - run: |
        cd src/TGC.HomeAutomation

        docker buildx build . \
          --platform linux/amd64,linux/arm64 \
          --tag $acr_registry/$image_name:${{ github.sha }} \
          --tag $acr_registry/$image_name:latest \
          --push

      name: "Build and publish API to ACR"

    # - run: |
